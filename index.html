<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaloga</title>

<style>
body { font-family: Arial; margin:0; }
.top { position:fixed; top:0; width:100%; background:#fff; padding:10px; border-bottom:1px solid #ccc; }
button { margin:2px; padding:10px; }
.content { padding:70px 10px; }
.item { border:1px solid #ccc; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<div class="top">
<button onclick="setView('skladisce')">Skladišče</button>
<button onclick="setView('proizvodnja')">Proizvodnja</button>
<button onclick="setView('kombi')">Kombi</button>
<button onclick="toggleAdd()">+ Dodaj</button>
<button onclick="exportData()">💾</button>
</div>

<div class="content">
<div id="addBox" style="display:none;">
<input id="ime" placeholder="Ime">
<input id="kg" type="number" placeholder="Kg / količina">
<select id="tip">
<option value="kolut">Kolut</option>
<option value="izdelek">Izdelek</option>
</select>
<button onclick="add()">Dodaj</button>
</div>

<div id="list"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || [];
let current = localStorage.getItem('view') || 'skladisce';

function save() {
  localStorage.setItem('data', JSON.stringify(data));
}

function setView(v){
  current = v;
  localStorage.setItem('view', v);
  render();
}

function toggleAdd(){
  let box = document.getElementById('addBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function add(){
  let ime = document.getElementById('ime').value;
  let kg = parseFloat(document.getElementById('kg').value);
  let tip = document.getElementById('tip').value;

  if(!ime || isNaN(kg)) return alert("Vnesi podatke");

  data.push({
    ime,
    kg,
    tip,
    lokacija: current
  });

  save();
  render();
}

function render(){
  let list = document.getElementById('list');
  list.innerHTML = '';

  let filtered = data.filter(x => x.lokacija === current);

  if(current === 'proizvodnja'){
    let koluti = filtered.filter(x=>x.tip==='kolut');
    let total = koluti.reduce((a,b)=>a+b.kg,0);

    let t = document.createElement('h3');
    t.innerText = "SKUPAJ: " + total + " kg";
    list.appendChild(t);

    koluti.forEach((x,i)=>{
      let div = document.createElement('div');
      div.className='item';
      div.innerHTML = `${x.ime} - ${x.kg} kg 
      <button onclick="use(${i})">Porabi</button>`;
      list.appendChild(div);
    });
  } else {
    let grouped = {};

    filtered.forEach(x=>{
      if(x.tip==='izdelek'){
        if(!grouped[x.ime]) grouped[x.ime]=0;
        grouped[x.ime]+=x.kg;
      }
    });

    for(let k in grouped){
      let div = document.createElement('div');
      div.className='item';
      div.innerText = `${k} - ${grouped[k]}`;
      list.appendChild(div);
    }
  }
}

function use(i){
  if(confirm("Porabi kolut?")){
    let filtered = data.filter(x => x.lokacija === 'proizvodnja' && x.tip==='kolut');
    let item = filtered[i];
    let index = data.indexOf(item);
    data.splice(index,1);
    save();
    render();
  }
}

function exportData(){
  let blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "zaloga-backup.json";
  a.click();
}

render();

</script>

</body>
</html>
