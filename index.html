<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaloga</title>

<link rel="manifest" href="manifest.json">

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

<style>
body { font-family: Arial; margin:0; }

.top { position:fixed; top:0; width:100%; background:#fff; display:flex; }
.top button { flex:1; padding:10px; font-size:14px; }

.active { background:#4CAF50; color:white; }

.content { padding:60px 10px; }

.item { border:1px solid #ccc; padding:10px; margin:5px 0; }

.qty button { margin:2px; padding:8px; }

.menu {
  position:fixed;
  top:0;
  right:0;
  background:white;
  border:1px solid #ccc;
  display:none;
}
</style>
</head>

<body>

<div class="top">
<button id="skladisce" onclick="setView('skladisce')">Skladišče</button>
<button id="kombi" onclick="setView('kombi')">Kombi</button>
<button id="danes" onclick="setView('danes')">Danes</button>
<button onclick="openAdd()">+ Dodaj</button>
<button onclick="toggleMenu()">⋮</button>
</div>

<div class="menu" id="menu">
  <button onclick="setTeren()">Teren</button>
  <button onclick="clearTeren()">Brez terena</button>
</div>

<div class="content" id="list"></div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || [];
let log = JSON.parse(localStorage.getItem('log')) || [];
let current = localStorage.getItem('view') || 'kombi';
let teren = localStorage.getItem('teren') || '';

function save(){
  localStorage.setItem('data', JSON.stringify(data));
  localStorage.setItem('log', JSON.stringify(log));
  localStorage.setItem('teren', teren);
}

function setView(v){
  current = v;
  localStorage.setItem('view', v);
  render();
}

function toggleMenu(){
  let m = document.getElementById('menu');
  m.style.display = m.style.display==='block' ? 'none' : 'block';
}

function setTeren(){
  teren = prompt("Teren (npr NM):") || '';
  save();
  toggleMenu();
}

function clearTeren(){
  teren = '';
  save();
  toggleMenu();
}

function openAdd(){
  let ime = prompt("Ime artikla?");
  if(!ime) return;

  let kg = parseFloat(prompt("Količina?"));
  if(isNaN(kg)) return;

  data.push({ime, kg, lokacija: current});
  save();
  render();
}

function addLog(ime, kg){
  log.unshift({
    time: new Date().toISOString(),
    ime,
    kg,
    teren
  });
}

function render(){
  let list = document.getElementById('list');
  list.innerHTML='';

  document.querySelectorAll('.top button').forEach(b=>b.classList.remove('active'));
  document.getElementById(current)?.classList.add('active');

  if(current==='danes'){
    let today = new Date().toISOString().slice(0,10);

    let todayLog = log.filter(x=>x.time.startsWith(today));

    let grouped = {};
    todayLog.forEach(x=>{
      if(!grouped[x.ime]) grouped[x.ime]=0;
      grouped[x.ime]+=x.kg;
    });

    for(let k in grouped){
      list.innerHTML += `<div class="item">${k} - ${grouped[k]}</div>`;
    }
    return;
  }

  let filtered = data.filter(x=>x.lokacija===current);

  let grouped = {};
  filtered.forEach(x=>{
    if(!grouped[x.ime]) grouped[x.ime]=0;
    grouped[x.ime]+=x.kg;
  });

  for(let k in grouped){

    if(current==='kombi'){
      list.innerHTML += `
        <div class="item">
        <b>${k}</b> - ${grouped[k]}
        <div class="qty">
          <button onclick="sell('${k}',1)">+1</button>
          <button onclick="sell('${k}',5)">+5</button>
          <button onclick="sell('${k}',10)">+10</button>
        </div>
        </div>
      `;
    } else {
      list.innerHTML += `
        <div class="item">
        ${k} - ${grouped[k]}
        <button onclick="move('${k}')">→ Kombi</button>
        </div>
      `;
    }

  }
}

function move(ime){
  let koliko = parseFloat(prompt("Koliko?"));
  if(isNaN(koliko)) return;

  let items = data.filter(x=>x.ime===ime && x.lokacija==='skladisce');

  let remaining = koliko;

  for(let i=0;i<items.length;i++){
    if(remaining<=0) break;

    let take = Math.min(items[i].kg, remaining);
    items[i].kg -= take;
    remaining -= take;

    data.push({ime, kg:take, lokacija:'kombi'});
  }

  data = data.filter(x=>x.kg>0);
  save();
  render();
}

function sell(ime, qty){
  let items = data.filter(x=>x.ime===ime && x.lokacija==='kombi');

  let remaining = qty;

  for(let i=0;i<items.length;i++){
    if(remaining<=0) break;

    let take = Math.min(items[i].kg, remaining);
    items[i].kg -= take;
    remaining -= take;

    addLog(ime, take);
  }

  data = data.filter(x=>x.kg>0);
  save();
  render();
}

render();

</script>

</body>
</html>
