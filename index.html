<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaloga</title>

<style>
body { font-family: Arial; margin:0; }
.top { position:fixed; top:0; width:100%; background:#fff; padding:5px; display:flex; flex-wrap:wrap; }
.top button { flex:1; margin:2px; padding:8px; font-size:12px; }
.active { background:#4CAF50; color:white; }
.content { padding:80px 10px; }
.item { border:1px solid #ccc; padding:10px; margin:5px 0; }

.quick button{
  margin:2px;
  padding:10px;
}
</style>
</head>

<body>

<div class="top">
<button id="skladisce" onclick="setView('skladisce')">Skladišče</button>
<button id="proizvodnja" onclick="setView('proizvodnja')">Proizvodnja</button>
<button id="kombi" onclick="setView('kombi')">Kombi</button>
<button id="danes" onclick="setView('danes')">Danes</button>
<button onclick="openAdd()">+ Dodaj</button>
</div>

<div class="content" id="list"></div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || [];
let log = JSON.parse(localStorage.getItem('log')) || [];
let artikli = JSON.parse(localStorage.getItem('artikli')) || [];

let current = localStorage.getItem('view') || 'skladisce';

function save(){
  localStorage.setItem('data', JSON.stringify(data));
  localStorage.setItem('log', JSON.stringify(log));
  localStorage.setItem('artikli', JSON.stringify(artikli));
}

function addLog(text){
  log.unshift({
    time: new Date().toISOString(),
    text
  });
}

function setView(v){
  current = v;
  localStorage.setItem('view', v);
  render();
}

function highlight(){
  ['skladisce','proizvodnja','kombi','danes'].forEach(id=>{
    let el = document.getElementById(id);
    if(el) el.classList.remove('active');
  });
  document.getElementById(current)?.classList.add('active');
}

function openAdd(){
  let ime = prompt("Ime artikla?");
  if(!ime) return;

  let kg = parseFloat(prompt("Količina?"));
  if(isNaN(kg)) return;

  let tip = prompt("Tip (kolut / izdelek)?");

  data.push({ime, kg, tip, lokacija: current});
  addLog("Dodano: " + ime + " (" + kg + ")");
  save();
  render();
}

function render(){
  highlight();
  let list = document.getElementById('list');
  list.innerHTML='';

  if(current === 'danes'){
    let today = new Date().toISOString().slice(0,10);

    let todayLog = log.filter(x=>x.time.startsWith(today));

    let grouped = {};

    todayLog.forEach(x=>{
      if(x.text.startsWith("Premik")){
        let ime = x.text.split(": ")[1].split(" (")[0];
        let kg = parseFloat(x.text.split("(")[1]);

        if(!grouped[ime]) grouped[ime]=0;
        grouped[ime]+=kg;
      }
    });

    for(let k in grouped){
      list.innerHTML += `<div class="item">${k} - ${grouped[k]}</div>`;
    }

    return;
  }

  let filtered = data.filter(x=>x.lokacija===current);

  if(current==='proizvodnja'){
    let koluti = filtered.filter(x=>x.tip==='kolut');
    let total = koluti.reduce((a,b)=>a+b.kg,0);

    list.innerHTML += `<h3>SKUPAJ: ${total} kg</h3>`;

    koluti.forEach((x,i)=>{
      list.innerHTML += `
        <div class="item">
        ${x.ime} - ${x.kg}
        <button onclick="porabi(${i})">Porabi</button>
        </div>
      `;
    });

  } else {

    let items = filtered.filter(x=>x.tip==='izdelek');

    let grouped = {};

    items.forEach(x=>{
      if(!grouped[x.ime]) grouped[x.ime]=0;
      grouped[x.ime]+=x.kg;
    });

    // 🔥 HITRI GUMBI
    list.innerHTML += `<div class="quick">`;

    Object.keys(grouped).forEach(k=>{
      list.innerHTML += `
        <button onclick="quickAdd('${k}')">${k}</button>
      `;
    });

    list.innerHTML += `</div>`;

    for(let k in grouped){
      list.innerHTML += `
        <div class="item">
        ${k} - ${grouped[k]}
        <br>
        ${current==='skladisce' ? `<button onclick="move('${k}','skladisce','kombi')">→ Kombi</button>`:''}
        ${current==='kombi' ? `<button onclick="move('${k}','kombi','skladisce')">← Skladišče</button>`:''}
        </div>
      `;
    }
  }
}

function quickAdd(ime){
  let kg = parseFloat(prompt("Količina?"));
  if(isNaN(kg)) return;

  data.push({ime, kg, tip:'izdelek', lokacija: current});
  addLog("Dodano: " + ime + " (" + kg + ")");
  save();
  render();
}

function move(ime, from, to){
  let koliko = parseFloat(prompt("Koliko?"));
  if(isNaN(koliko)) return;

  let items = data.filter(x=>x.ime===ime && x.lokacija===from);

  let remaining = koliko;

  for(let i=0;i<items.length;i++){
    if(remaining<=0) break;

    let take = Math.min(items[i].kg, remaining);
    items[i].kg -= take;
    remaining -= take;

    data.push({ime, kg:take, tip:'izdelek', lokacija:to});
  }

  addLog("Premik: " + ime + " (" + koliko + ")");

  data = data.filter(x=>x.kg>0);
  save();
  render();
}

function porabi(i){
  let koluti = data.filter(x=>x.lokacija==='proizvodnja' && x.tip==='kolut');
  let item = koluti[i];
  let index = data.indexOf(item);

  data.splice(index,1);
  addLog("Poraba: " + item.ime);

  save();
  render();
}

render();

</script>

</body>
</html>
