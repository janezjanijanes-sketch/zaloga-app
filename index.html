<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaloga</title>

<style>
body { font-family: Arial; margin:0; }
.top { position:fixed; top:0; width:100%; background:#fff; padding:5px; display:flex; flex-wrap:wrap; }
.top button { flex:1; margin:2px; padding:8px; font-size:12px; }
.active { background:#4CAF50; color:white; }
.content { padding:70px 10px; }
.item { border:1px solid #ccc; padding:10px; margin:5px 0; }
.small { font-size:12px; color:gray; }

#popup {
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

#popupBox {
  background:#fff;
  margin:50px 10px;
  padding:20px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="top">
<button id="skladisce" onclick="setView('skladisce')">Skladišče</button>
<button id="proizvodnja" onclick="setView('proizvodnja')">Proizvodnja</button>
<button id="kombi" onclick="setView('kombi')">Kombi</button>
<button onclick="setView('zgodovina')">Zgodovina</button>
<button onclick="openPopup()">+ Dodaj</button>
</div>

<div class="content" id="list"></div>

<div id="popup">
  <div id="popupBox">
    <h3>Dodaj</h3>
    <input id="ime" placeholder="Ime">
    <input id="kg" type="number" placeholder="Kg / količina">
    <select id="tip">
      <option value="kolut">Kolut</option>
      <option value="izdelek">Izdelek</option>
    </select>
    <button onclick="add()">Dodaj</button>
    <button onclick="closePopup()">Zapri</button>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || [];
let log = JSON.parse(localStorage.getItem('log')) || [];
let current = localStorage.getItem('view') || 'skladisce';

function save(){
  localStorage.setItem('data', JSON.stringify(data));
  localStorage.setItem('log', JSON.stringify(log));
}

function addLog(text){
  log.unshift(new Date().toLocaleString() + " - " + text);
}

function setView(v){
  current = v;
  localStorage.setItem('view', v);
  render();
}

function highlight(){
  ['skladisce','proizvodnja','kombi','zgodovina'].forEach(id=>{
    let el = document.getElementById(id);
    if(el) el.classList.remove('active');
  });
  let activeBtn = document.getElementById(current);
  if(activeBtn) activeBtn.classList.add('active');
}

function openPopup(){
  document.getElementById('popup').style.display='block';
}

function closePopup(){
  document.getElementById('popup').style.display='none';
}

function add(){
  let ime = document.getElementById('ime').value;
  let kg = parseFloat(document.getElementById('kg').value);
  let tip = document.getElementById('tip').value;

  if(!ime || isNaN(kg)) return alert("Vnesi podatke");

  data.push({ime, kg, tip, lokacija: current});
  addLog("Dodano: " + ime + " (" + kg + ")");
  save();
  closePopup();
  render();
}

function render(){
  highlight();
  let list = document.getElementById('list');
  list.innerHTML='';

  if(current === 'zgodovina'){
    log.forEach(x=>{
      list.innerHTML += `<div class="item small">${x}</div>`;
    });
    return;
  }

  let filtered = data.filter(x=>x.lokacija===current);

  if(current==='proizvodnja'){
    let koluti = filtered.filter(x=>x.tip==='kolut');
    let total = koluti.reduce((a,b)=>a+b.kg,0);

    list.innerHTML += `<h3>SKUPAJ: ${total} kg</h3>`;

    koluti.forEach((x,i)=>{
      list.innerHTML += `
        <div class="item">
        ${x.ime} - ${x.kg} kg
        <br>
        <button onclick="porabi(${i})">Porabi</button>
        <button onclick="deleteItem(${i}, 'proizvodnja')">Izbriši</button>
        </div>
      `;
    });

  } else {

    let items = filtered.filter(x=>x.tip==='izdelek');

    items.forEach((x,i)=>{
      list.innerHTML += `
        <div class="item">
        ${x.ime} - ${x.kg}
        <br>
        ${current==='skladisce' ? `<button onclick="move(${i}, 'skladisce','kombi')">→ Kombi</button>`:''}
        ${current==='kombi' ? `<button onclick="move(${i}, 'kombi','skladisce')">← Skladišče</button>`:''}
        <button onclick="deleteItem(${i}, '${current}')">Izbriši</button>
        </div>
      `;
    });
  }
}

function move(i, from, to){
  let filtered = data.filter(x=>x.lokacija===from && x.tip==='izdelek');
  let item = filtered[i];

  let koliko = parseFloat(prompt("Koliko?"));
  if(isNaN(koliko) || koliko<=0) return;

  if(item.kg < koliko) return alert("Ni dovolj");

  item.kg -= koliko;

  data.push({ime:item.ime, kg:koliko, tip:'izdelek', lokacija:to});
  addLog("Premik: " + item.ime + " (" + koliko + ")");

  data = data.filter(x=>x.kg>0);

  save();
  render();
}

function porabi(i){
  let koluti = data.filter(x=>x.lokacija==='proizvodnja' && x.tip==='kolut');
  let item = koluti[i];
  let index = data.indexOf(item);

  addLog("Poraba koluta: " + item.ime);

  data.splice(index,1);
  save();
  render();
}

function deleteItem(i, loc){
  let filtered = data.filter(x=>x.lokacija===loc);
  let item = filtered[i];

  if(confirm("Izbriši?")){
    addLog("Izbris: " + item.ime);
    data = data.filter(x => x !== item);
    save();
    render();
  }
}

render();

</script>

</body>
</html>
