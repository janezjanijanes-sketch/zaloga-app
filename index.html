<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaloga</title>

<style>
body { font-family: Arial; margin:0; }
.top { position:fixed; top:0; width:100%; background:#fff; padding:5px; display:flex; }
.top button { flex:1; margin:2px; padding:8px; font-size:12px; }
.active { background:#4CAF50; color:white; }
.content { padding:60px 10px; }
.item { border:1px solid #ccc; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<div class="top">
<button id="skladisce" onclick="setView('skladisce')">Skladišče</button>
<button id="proizvodnja" onclick="setView('proizvodnja')">Proizvodnja</button>
<button id="kombi" onclick="setView('kombi')">Kombi</button>
<button onclick="addItem()">+ Dodaj</button>
</div>

<div class="content" id="list"></div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || [];
let current = localStorage.getItem('view') || 'skladisce';

function save(){
  localStorage.setItem('data', JSON.stringify(data));
}

function setView(v){
  current = v;
  localStorage.setItem('view', v);
  render();
}

function highlight(){
  ['skladisce','proizvodnja','kombi'].forEach(id=>{
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(current).classList.add('active');
}

function addItem(){
  let ime = prompt("Ime?");
  let kg = parseFloat(prompt("Količina?"));
  let tip = prompt("Tip (kolut / izdelek)?");

  if(!ime || isNaN(kg)) return;

  data.push({ime, kg, tip, lokacija: current});
  save();
  render();
}

function render(){
  highlight();
  let list = document.getElementById('list');
  list.innerHTML='';

  let filtered = data.filter(x=>x.lokacija===current);

  if(current==='proizvodnja'){
    let koluti = filtered.filter(x=>x.tip==='kolut');
    let total = koluti.reduce((a,b)=>a+b.kg,0);

    list.innerHTML += `<h3>SKUPAJ: ${total} kg</h3>`;

    koluti.forEach((x,i)=>{
      list.innerHTML += `
        <div class="item">
        ${x.ime} - ${x.kg}
        <br>
        <button onclick="porabi(${i})">Porabi</button>
        </div>
      `;
    });

  } else {

    let izdelki = filtered.filter(x=>x.tip==='izdelek');

    let grouped = {};

    izdelki.forEach(x=>{
      if(!grouped[x.ime]) grouped[x.ime]=0;
      grouped[x.ime]+=x.kg;
    });

    for(let k in grouped){
      list.innerHTML += `
        <div class="item">
        ${k} - ${grouped[k]}
        <br>
        ${current==='skladisce' ? `<button onclick="premik('${k}','kombi')">→ Kombi</button>`:''}
        ${current==='kombi' ? `<button onclick="premik('${k}','skladisce')">← Skladišče</button>`:''}
        </div>
      `;
    }
  }
}

function premik(ime, cilj){
  let koliko = parseFloat(prompt("Koliko?"));
  if(isNaN(koliko)) return;

  let items = data.filter(x=>x.ime===ime && x.lokacija===current);

  let sum = items.reduce((a,b)=>a+b.kg,0);
  if(koliko > sum) return alert("Ni dovolj");

  let remaining = koliko;

  for(let i=0;i<items.length;i++){
    if(remaining<=0) break;

    let take = Math.min(items[i].kg, remaining);
    items[i].kg -= take;
    remaining -= take;

    data.push({ime, kg:take, tip:'izdelek', lokacija:cilj});
  }

  data = data.filter(x=>x.kg>0);
  save();
  render();
}

function porabi(i){
  let koluti = data.filter(x=>x.lokacija==='proizvodnja' && x.tip==='kolut');
  let item = koluti[i];
  let index = data.indexOf(item);
  data.splice(index,1);
  save();
  render();
}

render();

</script>

</body>
</html>
