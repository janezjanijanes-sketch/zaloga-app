<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zaloga</title>

<style>
body { font-family: Arial; padding:20px; }
button { width:100%; padding:15px; margin:5px 0; }
input, select { width:100%; padding:10px; margin:5px 0; }
.item { border:1px solid #ccc; padding:10px; margin-top:5px; }
</style>
</head>

<body>

<h1>Zaloga</h1>

<div id="menu">
<button onclick="view('skladisce')">Skladišče</button>
<button onclick="view('proizvodnja')">Proizvodnja</button>
<button onclick="view('kombi')">Kombi</button>
<button onclick="view('artikli')">Artikli</button>
</div>

<div id="content"></div>

<script>

let data = JSON.parse(localStorage.getItem('data')) || [];

function save() {
  localStorage.setItem('data', JSON.stringify(data));
}

function view(v) {
  const c = document.getElementById('content');
  c.innerHTML = '';

  if(v === 'artikli') {
    c.innerHTML = `
      <h2>Dodaj artikel</h2>
      <input id="ime" placeholder="Ime">
      <input id="kg" type="number" placeholder="Kg / količina">
      <select id="tip">
        <option value="kolut">Kolut</option>
        <option value="izdelek">Izdelek</option>
      </select>
      <select id="lokacija">
        <option value="skladisce">Skladišče</option>
        <option value="proizvodnja">Proizvodnja</option>
        <option value="kombi">Kombi</option>
      </select>
      <button onclick="add()">Dodaj</button>
    `;
  }

  if(v === 'skladisce' || v === 'kombi') {
    let filtered = data.filter(x => x.lokacija === v);

    let grouped = {};

    filtered.forEach(x => {
      if(x.tip === 'izdelek') {
        if(!grouped[x.ime]) grouped[x.ime] = 0;
        grouped[x.ime] += x.kg;
      }
    });

    for(let k in grouped) {
      let div = document.createElement('div');
      div.className='item';
      div.innerHTML = `${k} - ${grouped[k]}`;
      c.appendChild(div);
    }
  }

  if(v === 'proizvodnja') {
    let filtered = data.filter(x => x.lokacija === 'proizvodnja' && x.tip === 'kolut');

    let total = filtered.reduce((a,b)=>a+b.kg,0);

    let t = document.createElement('h2');
    t.innerText = "SKUPAJ: " + total + " kg";
    c.appendChild(t);

    filtered.forEach((x,i)=>{
      let div = document.createElement('div');
      div.className='item';
      div.innerHTML = `${x.ime} - ${x.kg} kg 
      <button onclick="use(${i})">Porabi</button>`;
      c.appendChild(div);
    });
  }
}

function add() {
  let ime = document.getElementById('ime').value;
  let kg = parseFloat(document.getElementById('kg').value);
  let tip = document.getElementById('tip').value;
  let lokacija = document.getElementById('lokacija').value;

  if(!ime || isNaN(kg)) return alert("Vnesi podatke");

  data.push({ime, kg, tip, lokacija});
  save();
  alert("Dodano");
}

function use(i) {
  if(confirm("Porabi kolut?")) {
    data.splice(i,1);
    save();
    view('proizvodnja');
  }
}

view('skladisce');

</script>

</body>
</html>
