<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zaloga</title>

  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">

  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { margin: 5px 0; padding: 10px; width: 100%; }
    .artikel { border: 1px solid #ccc; padding: 10px; margin-top: 10px; }
    button { cursor: pointer; }
  </style>
</head>

<body>

<h1>Zaloga</h1>

<input id="artikel" placeholder="Artikel">
<input id="kolicina" type="number" placeholder="Količina">
<input id="skladisce" placeholder="Skladišče (Centralno/Kombi)">

<button onclick="dodajArtikel()">Dodaj</button>

<div id="seznam"></div>

<script>

let podatki = JSON.parse(localStorage.getItem('zaloga')) || [];

const seznam = document.getElementById('seznam');

function shrani() {
  localStorage.setItem('zaloga', JSON.stringify(podatki));
}

function dodajArtikel() {
  const a = document.getElementById('artikel').value;
  const k = parseFloat(document.getElementById('kolicina').value);
  const s = document.getElementById('skladisce').value || 'Centralno';

  if(!a || isNaN(k)) return alert('Vnesi artikel in količino');

  podatki.push({ artikel: a, kolicina: k, skladisce: s });
  shrani();
  render();

  document.getElementById('artikel').value='';
  document.getElementById('kolicina').value='';
}

function render() {
  seznam.innerHTML = '';
  podatki.forEach((x,i) => {
    const div = document.createElement('div');
    div.className='artikel';
    div.innerHTML = `
      ${x.artikel} - ${x.kolicina} (${x.skladisce})
      <br>
      <button onclick="izbrisi(${i})">Izbriši</button>
    `;
    seznam.appendChild(div);
  });
}

function izbrisi(i) {
  if(confirm('Si siguren da želiš izbrisati?')) {
    podatki.splice(i,1);
    shrani();
    render();
  }
}

render();

</script>

</body>
</html>
